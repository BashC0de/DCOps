# Grafana auto-provisioned datasources. Ships: Week 1.
apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: ${TIMESCALE_USER:-dcops}
    secureJsonData:
      password: ${TIMESCALE_PASSWORD:-changeme_timescale}
    jsonData:
      database: ${TIMESCALE_DB:-dcops}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
