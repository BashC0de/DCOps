name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (lint + unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.27"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies (with dev group)
        run: uv sync --dev --frozen || uv sync --dev

      - name: Ruff (lint)
        run: uv run ruff check apps tests scripts benchmarks

      - name: Ruff (format check)
        run: uv run ruff format --check apps tests scripts benchmarks

      - name: Mypy
        run: uv run mypy apps
        continue-on-error: true  # scaffold has stubs; relax until Week 3

      - name: Pytest (unit only)
        run: uv run pytest -m "not slow and not integration" --no-cov

  dashboard:
    name: dashboard (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

  compose:
    name: compose config (validate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          docker compose --profile data config --quiet
          docker compose --profile dev  config --quiet
          docker compose --profile demo config --quiet

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pre-commit==4.0.1
      - run: pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true  # advisory until Week 3
